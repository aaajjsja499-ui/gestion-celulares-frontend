<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sistema de Gestion de Celulares</title>

  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/componentes.css" />
  <link rel="stylesheet" href="css/tema-oscuro.css" />
</head>
<body>

  <header id="app-header" hidden>
    <strong id="app-titulo">Gestion de Celulares</strong>
    <span id="app-usuario"></span>
  </header>

  <main id="login-pantalla">
    <h1>Gestion de Celulares</h1>
    <p>Iniciá sesión con tu email y PIN para continuar.</p>
    <form id="form-login">
      <label for="login-email">Email</label>
      <input type="email" id="login-email" name="email" required autocomplete="username" />

      <label for="login-pin">PIN</label>
      <input type="password" id="login-pin" name="pin" inputmode="numeric" pattern="[0-9]{4,6}" minlength="4" maxlength="6" required autocomplete="current-password" />

      <button type="submit">Ingresar</button>
    </form>
    <p id="login-error" hidden></p>
  </main>

  <main id="app-contenido" hidden></main>

  <!-- config.js va primero: todo lo demas depende de CONFIG -->
  <script src="config.js"></script>

  <!-- core: orden importa, cada uno depende del anterior -->
  <script src="js/core/estado.js"></script>
  <script src="js/core/cache.js"></script>
  <script src="js/core/api.js"></script>
  <script src="js/core/auth.js"></script>
  <script src="js/core/router.js"></script>

  <script src="js/utils.js"></script>

  <!-- calculos -->
  <script src="js/calculos/valoracion.js"></script>
  <script src="js/calculos/viabilidad.js"></script>
  <script src="js/calculos/rentabilidad.js"></script>
  <script src="js/calculos/alertas.js"></script>

  <!-- pantallas: cada una se auto-registra en el Router al cargar -->
  <script src="js/pantallas/dashboard.js"></script>
  <script src="js/pantallas/equipos.js"></script>
  <script src="js/pantallas/ficha-equipo.js"></script>
  <script src="js/pantallas/viabilidad-consulta.js"></script>
  <script src="js/pantallas/diagnosticos.js"></script>
  <script src="js/pantallas/reparaciones.js"></script>
  <script src="js/pantallas/repuestos.js"></script>
  <script src="js/pantallas/ventas.js"></script>
  <script src="js/pantallas/catalogo.js"></script>
  <script src="js/pantallas/decisiones.js"></script>
  <script src="js/pantallas/clientes.js"></script>

  <script>
    // Arranque de la app: mientras no haya login, solo se ve
    // #login-pantalla. Tras el login, se muestra el header y el
    // contenido, y arranca el router.
    Auth.iniciar();

    document.addEventListener("gestion-celulares:login-ok", () => {
      const { usuario } = Estado.get();
      document.getElementById("login-pantalla").hidden = true;
      document.getElementById("app-header").hidden = false;
      document.getElementById("app-contenido").hidden = false;
      document.getElementById("app-usuario").textContent =
        usuario.nombre + " (" + usuario.roles.join(", ") + ")";
      Router.iniciar();
    });
  </script>

</body>
</html>
